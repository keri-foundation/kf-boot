# This workflow installs Python dependencies, runs lint, and runs tests.

name: GitHub Actions for kf-boot
on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src tests

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-15, ubuntu-latest, windows-latest ]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Use runner temp drive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "TMPDIR=$env:RUNNER_TEMP" >> $env:GITHUB_ENV
          "TEMP=$env:RUNNER_TEMP" >> $env:GITHUB_ENV
          "TMP=$env:RUNNER_TEMP" >> $env:GITHUB_ENV

      - name: Install libsodium (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libsodium
          echo "DYLD_LIBRARY_PATH=$(brew --prefix libsodium)/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -e ".[dev]"

      - name: Check installed dependencies
        run: |
          python -m pip check

      - name: Compile Python files
        run: |
          python -m compileall -q src tests

      - name: Run tests
        run: |
          pytest tests/
